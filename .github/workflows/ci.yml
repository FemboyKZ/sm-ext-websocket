name: build

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "third_party/**"
  pull_request:
    paths:
      - "src/**"
      - "third_party/**"

permissions:
  contents: write

jobs:
  build:
    name: build on ${{ matrix.os_short }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_short: win

          - os: ubuntu-latest
            os_short: linux
            container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk

    steps:
      - name: Prepare env
        shell: bash
        run: |
          echo "GITHUB_SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Getting SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: master
          path: sourcemod
          submodules: recursive
          fetch-depth: 1

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y python3-pip python3-setuptools

      - name: Setting up Python
        if: runner.os == 'Windows'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install AMBuild
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            /usr/bin/python3 -m pip install git+https://github.com/alliedmodders/ambuild
          else
            python3 -m pip install git+https://github.com/alliedmodders/ambuild
          fi

      - name: Getting own repository
        uses: actions/checkout@v6
        with:
          path: extension
          submodules: recursive

      - uses: microsoft/setup-msbuild@v3
        if: runner.os == 'Windows'
        with:
          msbuild-architecture: x64
          vs-version: '[17.0,18.0)'

      - name: Compiling ${{ github.event.repository.name }} files
        working-directory: extension
        shell: bash
        run: |
          [ "$RUNNER_OS" = "Linux" ] && export PATH="/usr/bin:$PATH"
          mkdir build && cd build
          python3 ../configure.py --enable-optimize --symbol-files --sm-path="$GITHUB_WORKSPACE/sourcemod" --targets=x64,x86
          ambuild

      - name: Uploading package
        uses: actions/upload-artifact@v7
        with:
          name: sm-ext-websocket-${{ matrix.os_short }}-${{ env.GITHUB_SHA_SHORT }}
          path: extension/build/package
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: extension
          sparse-checkout: |
            src/smsdk_config.h

      - name: Get version from smsdk_config.h
        id: get_version
        run: |
          VERSION=$(grep '#define SMEXT_CONF_VERSION' extension/src/smsdk_config.h | awk -F '"' '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not find version in smsdk_config.h"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: echo "${{ github.event.head_commit.message }}" >> release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release Archives
        run: |
          cd artifacts
          for dir in sm-ext-websocket-*; do
            7z a "../${dir}.zip" "./${dir}/"*
          done

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            sm-ext-websocket-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}